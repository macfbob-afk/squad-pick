name: Claude AI Maintainer
# The AI that monitors and updates Squad Pick.
# Activate: repo Settings -> Secrets and variables -> Actions -> New repository secret
#   Name: ANTHROPIC_API_KEY   Value: your key from console.anthropic.com
# Then open any issue and write e.g. "@claude the dark theme button is broken, fix it"
# Claude reads the code, writes the fix, and opens a pull request automatically.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
